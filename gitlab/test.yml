test:
  stage: test
  image: python:3.10
  interruptible: true
  tags:
    - ralts-test
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - if: '$CI_COMMIT_BRANCH != "main"'
  before_script:
    - python -m pip install --upgrade pip
    - pip install .[dev]
    - pip install coverage
  script:
    - coverage run -m unittest discover tests
    - coverage report --fail-under=90
