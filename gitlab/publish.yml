publish:
  stage: publish
  image: python:3.10
  before_script:
    - python -m pip install --upgrade pip
    - pip install build twine
  script:
    - python -m build
    - twine upload dist/*
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
  variables:
    TWINE_USERNAME: "__token__"
    TWINE_PASSWORD: "$PYPI_API_TOKEN"
